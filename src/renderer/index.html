<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      No Content-Security-Policy meta tag here.

      In an Electron app the security boundary is context isolation + the preload
      bridge, not CSP. A renderer-level CSP would block Vite's HMR WebSocket in
      development (ws://localhost:5173) and module evaluation, while providing
      almost no extra protection in a desktop context where there is no
      same-origin concept.

      If CSP is needed for production it should be applied via
      `webRequest.onHeadersReceived` in the main process, not a meta tag.
    -->
    <title>Sediment</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
