name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release (e.g. v1.1.4)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build and publish macOS release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$APPLE_ID" ] && [ -n "$CSC_LINK" ]; then
            echo "Developer ID sign + notarize"
            bun run release:mac:notarized
          else
            echo "Ad-hoc sign only — add APPLE_ID + CSC_LINK secrets for notarized releases"
            unset CSC_LINK
            export CSC_FOR_PULL_REQUEST=true
            bun run release:mac
          fi

      - name: Verify code signatures
        run: |
          codesign --verify --deep --strict --verbose=2 dist/mac-arm64/Sediment.app
          codesign --verify --deep --strict --verbose=2 dist/mac/Sediment.app
          spctl -a -vv dist/mac-arm64/Sediment.app || true
          spctl -a -vv dist/mac/Sediment.app || true
