appId: com.nishilfaldu.sediment
productName: Sediment
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  entitlementsInherit: build/entitlements.mac.plist
  target:
    # dmg = website / first install; zip = in-app updater (Squirrel needs zip metadata too)
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  # Drag-to-Applications layout
  contents:
    - x: 130
      y: 180
    - x: 410
      y: 180
      type: link
      path: /Applications
# Zip used by the in-app updater to replace Sediment.app without a browser download.
zip:
  artifactName: ${name}-${version}-${arch}-mac.${ext}
npmRebuild: true
publish:
  provider: github
  owner: nishilfaldu
  repo: sediment
  # Publishes latest-mac.yml alongside artifacts for future electron-updater / notarized builds.
  publishAutoUpdate: true
