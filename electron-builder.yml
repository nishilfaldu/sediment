appId: com.nishilfaldu.sediment
productName: Sediment
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  entitlementsInherit: build/entitlements.mac.plist
  target:
    # dmg = website / first install; zip = in-app updater swap
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
# Shared by dmg + zip (electron-builder has no root `zip:` key in v26).
artifactName: ${name}-${version}-${arch}.${ext}
dmg:
  # Drag-to-Applications layout
  contents:
    - x: 130
      y: 180
    - x: 410
      y: 180
      type: link
      path: /Applications
npmRebuild: true
publish:
  provider: github
  owner: nishilfaldu
  repo: sediment
  # latest-mac.yml is published for tooling; the app updater uses the zip assets directly.
  publishAutoUpdate: true
